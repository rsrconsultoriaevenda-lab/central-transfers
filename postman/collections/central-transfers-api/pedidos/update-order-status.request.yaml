$kind: http-request
name: Update Order Status
method: PUT
url: '{{baseUrl}}/pedidos/{{pedido_id}}/status'
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
pathVariables:
  - key: pedido_id
    value: ''
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "em_andamento"
    }
