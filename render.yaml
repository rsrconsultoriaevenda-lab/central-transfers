services:
  # =========================
  # BACKEND (FastAPI)
  # =========================
  - type: web
    name: central-transfers-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: central_transfers_token_2024
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHONPATH
        value: .

  # =========================
  # FRONTEND (APP CLIENTE)
  # =========================
  - type: web
    name: central-transfers-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: central-transfers-backend
          type: web
          property: url

  # =========================
  # PAINEL ADMIN
  # =========================
  - type: web
    name: central-transfers-painel
    env: static
    buildCommand: cd painel-saas && npm install && npm run build
    staticPublishPath: painel-saas/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: central-transfers-backend
          type: web
          property: url
