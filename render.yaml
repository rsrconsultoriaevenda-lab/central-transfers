services:
  - type: web
    name: central-transfers-api
    runtime: python
    pythonVersion: "3.10.13"
    region: oregon
    plan: free

    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.main:app --bind 0.0.0.0:$PORT

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: central-db
          property: connectionString

  - type: web
    name: central-transfers-client
    env: node
    region: oregon
    plan: free

    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/dist

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: central-transfers-api
          property: url

  - type: web
    name: central-transfers-admin
    env: node
    region: oregon
    plan: free

    buildCommand: cd painel-saas && npm install && npm run build
    startCommand: npx serve -s painel-saas/dist

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: central-transfers-api
          property: url

databases:
  - name: central-db
    plan: free
    databaseName: central_transfers
    user: admin