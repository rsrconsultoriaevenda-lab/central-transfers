services:
  # Backend API
  - type: web
    name: central-transfers-api
    env: python
    region: oregon
    plan: free

    buildCommand: "pip install --upgrade pip && pip install -r backend/requirements.txt"
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: central-db
          property: connectionString

      - key: ALLOWED_ORIGINS
        value: "*"

      - key: WHATSAPP_TOKEN
        sync: false

      - key: WHATSAPP_VERIFY_TOKEN
        value: central_transfers_token_2024

      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false

      - key: WHATSAPP_API_VERSION
        value: v20.0

  # Frontend Cliente
  - type: web
    name: central-transfers-client
    env: node
    region: oregon
    plan: free

    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/dist

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: central-transfers-api
          property: url

  # Painel Admin
  - type: web
    name: central-transfers-admin
    env: node
    region: oregon
    plan: free

    buildCommand: cd painel-saas && npm install && npm run build
    startCommand: npx serve -s painel-saas/dist

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: central-transfers-api
          property: url

databases:
  - name: central-db
    plan: free
    databaseName: central_transfers
    user: admin