services:
  # Backend FastAPI
  - type: web
    name: central-transfers-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Você preencherá no painel do Render
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: central_transfers_token_2024
      - key: ALLOWED_ORIGINS
        value: "*" # Altere para a URL do seu frontend após o primeiro deploy
      - key: PYTHONPATH
        value: .

  # App do Cliente (Frontend)
  - type: static
    name: central-transfers-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    staticPublishCustomHeaders:
      - values:
          - key: Access-Control-Allow-Origin
            value: "*"
    envVars:
      - key: VITE_API_URL
        fromService:
          name: central-transfers-backend
          type: web
          property: host

  # Painel Administrativo (SaaS)
  - type: static
    name: central-transfers-painel
    env: static
    buildCommand: cd painel-saas && npm install && npm run build
    publishDir: painel-saas/dist
    staticPublishCustomHeaders:
      - values:
          - key: Access-Control-Allow-Origin
            value: "*"
    envVars:
      - key: VITE_API_URL
        fromService:
          name: central-transfers-backend
          type: web
          property: host