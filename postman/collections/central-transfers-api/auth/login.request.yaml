$kind: http-request
name: Login
method: POST
url: '{{baseUrl}}/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "senha": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Save token", function() {
        var json = pm.response.json();
        pm.environment.set("token", json.access_token);
      });
